name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Garante um deploy por vez, sem cancelar um em andamento
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publicar site estático
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Pages (ativa o Pages se necessário)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
