<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <!-- Content-Security-Policy: só carrega recursos do próprio domínio; imagens também
       como data: (fotos/assinaturas); sem scripts externos/inline; sem iframes/objetos. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#0083c1">
  <meta name="description" content="Checklist de segurança de campo para obras com interferência em rede de gás">
  <title>Checklist Gás</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topo" id="topo"></header>
  <main id="view"></main>
  <div class="aviso-salvo" id="aviso-salvo">✓ Salvo</div>

  <script src="js/versao.js"></script>
  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/assinatura.js"></script>
  <script src="js/relatorio.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
